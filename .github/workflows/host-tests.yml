name: host-tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-host:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install host dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libfdt-dev
      - name: Run host tests
        run: make test-host
